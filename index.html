<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Rentals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">DreamRentals</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Listings</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>Find Your Perfect Home</h1>
      <p>Modern, affordable, and beautiful rentals near you</p>
      <a href="#" class="btn">Browse Listings</a>
    </div>
  </section>

  <!-- LISTINGS -->
  <section class="listings">
    <h2>Featured Homes</h2>

    <div class="grid">
      <div class="card">
        <img src="house1.jpg" alt="House 1">
        <h3>Modern Apartment</h3>
        <p>$1,200 / month</p>
      </div>

      <div class="card">
        <img src="house2.jpg" alt="House 2">
        <h3>Cozy Family Home</h3>
        <p>$1,800 / month</p>
      </div>

      <div class="card">
        <img src="house3.jpg" alt="House 3">
        <h3>Luxury Villa</h3>
        <p>$3,500 / month</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 DreamRentals. All rights reserved.</p>
  </footer>

</body>
</html>
